name: playhub

services:

  # ── API .NET ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: playhub_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDB__ConnectionString=${MongoDB__ConnectionString}
      - MongoDB__DatabaseName=${MongoDB__DatabaseName}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - Serilog__WriteTo__2__Args__databaseUrl=${MongoDB__ConnectionString}
      - Redis__ConnectionString=${Redis__ConnectionString}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - playhub_net
    volumes:
      - .:/app
      - /app/src/PlayHub.Api/bin
      - /app/src/PlayHub.Api/obj
      - /app/src/PlayHub.Application/bin
      - /app/src/PlayHub.Application/obj
      - /app/src/PlayHub.Infrastructure/bin
      - /app/src/PlayHub.Infrastructure/obj
      - /app/src/PlayHub.Domain/bin
      - /app/src/PlayHub.Domain/obj

  # ── Redis (Cache) ──────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: playhub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - playhub_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Insight (UI para Cache) ──────────────────────────────────────────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: playhub_redis_insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    networks:
      - playhub_net

  # ── Seq (Structured Logs UI) ───────────────────────────────────────────────
  seq:
    image: datalust/seq:2024.1
    container_name: playhub_seq
    restart: unless-stopped
    ports:
      - "8082:80"
      - "5341:5341"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    volumes:
      - seq_data:/data
    networks:
      - playhub_net

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  seq_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  playhub_net:
    driver: bridge
