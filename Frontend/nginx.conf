############################################
# LOG FORMAT — Redação do JWT no query string do SignalR
############################################
log_format safe_log '$remote_addr - $remote_user [$time_local] '
                    '"$request_method $uri?[QUERY_REDACTED] $server_protocol" '
                    '$status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

############################################
# HTTP -> HTTPS Redirect + Certbot
############################################
server {
    listen 80;
    listen [::]:80;
    server_name varzeascore.com www.varzeascore.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://varzeascore.com$request_uri; 
    }
}

############################################
# HTTPS (PRODUÇÃO) - Redirecionamento de WWW para Non-WWW
############################################
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.varzeascore.com;

    ssl_certificate /etc/letsencrypt/live/varzeascore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/varzeascore.com/privkey.pem;

    return 301 https://varzeascore.com$request_uri;
}

############################################
# HTTPS (PRODUÇÃO) - Non-WWW Dominio Principal
############################################
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name varzeascore.com;

    ############################################
    # SSL CONFIGURATIONS (Mozilla Modern/Intermediate)
    ############################################
    ssl_certificate /etc/letsencrypt/live/varzeascore.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/varzeascore.com/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    ############################################
    # SECURITY HEADERS
    ############################################
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # (Opcional) add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https: wss:;";

    ############################################
    # GZIP COMPRESSION (Melhora a performance do Front)
    ############################################
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;
    gzip_disable "MSIE [1-6]\.";

    ############################################
    # FRONTEND (React / Vite)
    ############################################
    root /usr/share/nginx/html;
    index index.html;

    # Para o index.html, queremos garantir que NUNCA faça cache
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Cache estático (Vite assets)
    location ~* \.(?:css|js|woff2?|eot|ttf|mp4|webm)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Repetindo o HSTS para os assets (Boa prática de segurança)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # Cache estático para imagens (podem mudar, mas raramente)
    location ~* \.(?:ico|gif|jpe?g|png|svg|webp)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    ############################################
    # BLOQUEIA ARQUIVOS SENSÍVEIS E PATHS OCULTOS
    ############################################
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    ############################################
    # BACKEND .NET (API)
    ############################################
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        
        # Headers necessários para o Kestrel/.NET
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Otimizações de proxy
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_buffer_size 32k;
        client_max_body_size 50M; 
        
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    ############################################
    # SIGNALR (Placares ao vivo)
    ############################################
    location /hubs/ {
        proxy_pass http://api:8080/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        access_log /var/log/nginx/access.log safe_log;
    }


}